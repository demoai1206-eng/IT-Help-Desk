<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

/* General */
body { font-family: Arial, sans-serif; }

/* Chat Button */
#chatBtn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #0078D4;
  color: white;
  border: none;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  font-size: 18px;
  cursor: pointer;
}

/* Chat Box */
#chatBox {
  display: none;
  position: fixed;
  bottom: 75px;
  right: 15px;
  width: 280px;
  max-height: 350px;
  overflow-y: auto;
  background: white;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 10px;
}

/* Bot Text */
.bot {
  color: black;
  margin: 5px 0;
  font-size: 14px;
}

/* Buttons */
.option {
  display: block;
  width: 100%;
  margin: 5px 0;
  padding: 6px;
  border: none;
  background: #0078D4;
  color: white;
  border-radius: 5px;
  font-size: 13px;
  cursor: pointer;
}

.option:hover {
  background: #005ea6;
}

</style>
</head>

<body>

<button id="chatBtn" onclick="toggleChat()">💬</button>

<div id="chatBox">
  <div id="messages"></div>
</div>

<script>

// Toggle Chat
function toggleChat() {
  let box = document.getElementById("chatBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
  startBot();
}

// Bot Message (with clear option)
function addBot(msg, clear = false) {
  if (clear) {
    document.getElementById("messages").innerHTML = "";
  }
  document.getElementById("messages").innerHTML += "<div class='bot'>" + msg + "</div>";
}

// Start Bot
function startBot() {
  addBot("Hello! Welcome to IT Help Desk", true);
  addBot("How can I help you?");
  showMainMenu();
}

// Main Menu
function showMainMenu() {
  document.getElementById("messages").innerHTML += `
    <button class="option" onclick="raiseTicket()">Raise Ticket</button>
    <button class="option" onclick="trackTicket()">Track Ticket</button>
    <button class="option" onclick="contactIT()">Talk to IT</button>
  `;
}

// Raise Ticket
function raiseTicket() {
  addBot("Select request type:", true);

  document.getElementById("messages").innerHTML += `
    <button class="option" onclick="openService()">Service Request</button>
    <button class="option" onclick="openITIssue()">IT Issue</button>
    <button class="option" onclick="openAccess()">System Access</button>
    <button class="option" onclick="openCRM()">CRM Support</button>
    <button class="option" onclick="openOnboarding()">Onboarding</button>
    <button class="option" onclick="startBot()">⬅ Back</button>
  `;
}

// Forms
function openService() {
  window.open("https://forms.office.com/Pages/ResponsePage.aspx?id=paqN7sJIgUahza9uyO1zwtC1tAPUwFBDghay99JW111UOTZUQTEzVzlFU1ZKS0daRUpNOTYwQUxQVy4u");
}

function openITIssue() {
  window.open("https://forms.office.com/r/IT_ISSUE_FORM_LINK");
}

function openAccess() {
  window.open("https://forms.office.com/r/ACCESS_FORM_LINK");
}

function openCRM() {
  window.open("https://forms.office.com/r/CRM_FORM_LINK");
}

function openOnboarding() {
  window.open("https://forms.office.com/r/ONBOARDING_FORM_LINK");
}

// Track Ticket
function trackTicket() {
  addBot("Opening ticket page...", true);
  window.open("https://millnest.sharepoint.com/sites/Vijay_Testing/Lists/Hardware%20micro/AllItems.aspx");
}

// Contact IT
function contactIT() {
  addBot("Contact IT:", true);

  document.getElementById("messages").innerHTML += `
    <button class="option" onclick="openTeams()">Teams Chat</button>
    <button class="option" onclick="sendEmail()">Send Email</button>
    <button class="option" onclick="startBot()">⬅ Back</button>
  `;
}

function openTeams() {
  window.open("https://teams.microsoft.com");
}

function sendEmail() {
  window.location.href = "mailto:it.support@millnest.com";
}

</script>

</body>
</html>
