<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body { font-family: Arial, sans-serif; }

/* Floating Button */
#chatBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #0078D4;
  color: white;
  border: none;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  font-size: 24px;
  cursor: pointer;
}

/* Chat Window */
#chatWindow {
  display: none;
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 320px;
  background: white;
  border-radius: 10px;
  box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
  overflow: hidden;
}

/* Header */
#chatHeader {
  background: #0078D4;
  color: white;
  padding: 10px;
  font-weight: bold;
}

/* Messages */
#chatBody {
  padding: 10px;
  max-height: 400px;
  overflow-y: auto;
}

.bot {
  background: #f1f1f1;
  padding: 8px;
  border-radius: 8px;
  margin: 5px 0;
}

/* Buttons */
.option {
  display: block;
  margin: 5px 0;
  padding: 8px;
  background: #0078D4;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.option:hover {
  background: #005a9e;
}

</style>
</head>

<body>

<button id="chatBtn" onclick="toggleChat()">💬</button>

<div id="chatWindow">
  <div id="chatHeader">IT Help Desk</div>
  <div id="chatBody">
    <div class="bot">👋 Hello! How can I help you?</div>

    <button class="option" onclick="showResponse('issue')">IT Issue</button>
    <button class="option" onclick="showResponse('hardware')">Hardware Request</button>
    <button class="option" onclick="showResponse('access')">System Access</button>
    <button class="option" onclick="showResponse('remote')">Remote Work</button>
    <button class="option" onclick="showResponse('crm')">CRM Support</button>
    <button class="option" onclick="showResponse('onboarding')">New Onboarding</button>

    <div id="response"></div>
  </div>
</div>

<script>

function toggleChat() {
  let chat = document.getElementById("chatWindow");
  chat.style.display = chat.style.display === "block" ? "none" : "block";
}

function showResponse(type) {
  let res = document.getElementById("response");

  let message = "";

  if (type === 'issue') {
    message = "👉 Submit IT Issue:<br><a href='https://millnest.sharepoint.com/:l:/s/Vijay_Testing/JABpGk6MbzNHSqM_mjABd-OMAQmNs32Y0rv4Dh0KMgRMACk?nav=NGJhNWE5NTktOGNlZS00YWFlLTk5ZGItZmZhYWM2YzhjMzhh'>Open Form</a>";
  }
  else if (type === 'hardware') {
    message = "👉 Request Hardware:<br><a href='https://forms.office.com/Pages/ResponsePage.aspx?id=paqN7sJIgUahza9uyO1zwtC1tAPUwFBDghay99JW111UOTZUQTEzVzlFU1ZKS0daRUpNOTYwQUxQVy4u'>Open Form</a>";
  }
  else if (type === 'access') {
    message = "👉 System Access:<br><a href='https://millnest.sharepoint.com/:l:/s/Vijay_Testing/JAAF5-gem2SRRIkaCXoi3c5dAcOjAqpCJp14OtcRQbyfaVU?nav=ZjI0MTE0NjUtYjgxYS00NTdjLWI3MjAtM2E0NTU1ZmQyOGFh'>Open Form</a>";
  }
  else if (type === 'remote') {
    message = "👉 Remote Work:<br><a href='https://millnest.sharepoint.com/:l:/s/Vijay_Testing/JAByGSLOLmWnTrdPAPEH3uEjAVHG8ppcJFkHsf5g7RVMEK0?nav=MzI3MmZkYmQtNzI2Yi00ZTYyLWFiZGUtMTYwM2NlNjkyYTNj'>Open Form</a>";
  }
  else if (type === 'crm') {
    message = "👉 CRM Support:<br><a href='https://millnest.sharepoint.com/:l:/s/Vijay_Testing/JACbs_8gmdwVQYuvISpXpOaKAT2opxmPGY_aUgxW66Ad8xI?nav=YWY4ZjRjZjYtYmM2Yy00NzZhLWI4NTMtODMyMmFkNzYyODRk'>Open Form</a>";
  }
  else if (type === 'onboarding') {
    message = "👉 Employee Onboarding:<br><a href='https://millnest.sharepoint.com/:l:/s/Vijay_Testing/JABvlV452Ja1SqAt-HFBtInZAd3vRonVLNaYms8kaf5hNWI?nav=MWVjNmI4ZDYtOTFkMi00Mzg3LWExNjMtNzk3YzRjNjVmNGFk'>Open Form</a>";
  }

  // Append instead of replace
  res.innerHTML += "<div class='bot'>" + message + "</div>";
}

</script>

</body>
</html>
