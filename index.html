<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body { font-family: Arial, sans-serif; }

/* Floating Button */
#chatBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #0078D4;
  color: white;
  border: none;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  font-size: 20px;
  cursor: pointer;
}

/* Chat Box */
#chatBox {
  display: none;
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 320px;
  max-height: 400px;
  overflow-y: auto;
  background: white;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 10px;
}

/* Messages */
.bot { color: #0078D4; margin: 5px 0; }
.user { color: green; text-align: right; }

/* Buttons */
.option {
  display: block;
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  border: none;
  background: #0078D4;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

.option:hover {
  background: #005ea6;
}

</style>
</head>

<body>

<!-- Chat Button -->
<button id="chatBtn" onclick="toggleChat()">💬</button>

<!-- Chat Window -->
<div id="chatBox">
  <div id="messages"></div>
</div>

<script>

// Toggle Chat
function toggleChat() {
  let box = document.getElementById("chatBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
  startBot();
}

// Bot Message
function addBot(msg) {
  document.getElementById("messages").innerHTML += "<div class='bot'>" + msg + "</div>";
}

// Start Bot
function startBot() {
  document.getElementById("messages").innerHTML = "";
  
  addBot("👋 Hello! Welcome to IT Help Desk");
  addBot("How can I help you?");

  showMainMenu();
}

// MAIN MENU
function showMainMenu() {
  document.getElementById("messages").innerHTML += `
    <button class="option" onclick="raiseTicket()">Raise Ticket</button>
    <button class="option" onclick="trackTicket()">Track Ticket</button>
    <button class="option" onclick="contactIT()">Talk to IT Person</button>
  `;
}

// RAISE TICKET OPTIONS
function raiseTicket() {
  addBot("Please select request type:");

  document.getElementById("messages").innerHTML += `
    <button class="option" onclick="openService()">Service Request</button>
    <button class="option" onclick="openITIssue()"> IT Issue</button>
    <button class="option" onclick="openAccess()">System Access</button>
    <button class="option" onclick="openCRM()">CRM Support</button>
    <button class="option" onclick="openOnboarding()">Onboarding</button>
  `;
}

// FORM LINKS (REPLACE THESE)
function openService() {
  addBot("Opening Service Request Form...");
  window.open("https://forms.office.com/Pages/ResponsePage.aspx?id=paqN7sJIgUahza9uyO1zwtC1tAPUwFBDghay99JW111UOTZUQTEzVzlFU1ZKS0daRUpNOTYwQUxQVy4u");
}

function openITIssue() {
  addBot("Opening IT Issue Form...");
  window.open("https://forms.office.com/r/IT_ISSUE_FORM_LINK");
}

function openAccess() {
  addBot("Opening System Access Form...");
  window.open("https://forms.office.com/r/ACCESS_FORM_LINK");
}

function openCRM() {
  addBot("Opening CRM Support Form...");
  window.open("https://forms.office.com/r/CRM_FORM_LINK");
}

function openOnboarding() {
  addBot("Opening Onboarding Form...");
  window.open("https://forms.office.com/r/ONBOARDING_FORM_LINK");
}

// TRACK TICKET
function trackTicket() {
  addBot("You can track your ticket here:");
  window.open("https://your-sharepoint-site-url"); // 🔁 Replace
}

// CONTACT IT
function contactIT() {
  addBot("Choose how you want to contact IT:");

  document.getElementById("messages").innerHTML += `
    <button class="option" onclick="openTeams()">💬 Chat in Teams</button>
    <button class="option" onclick="sendEmail()">📧 Send Email</button>
  `;
}

function openTeams() {
  window.open("https://teams.microsoft.com");
}

function sendEmail() {
  window.location.href = "mailto:it.support@millnest.com?subject=IT Support Required";
}

</script>

</body>
</html>
