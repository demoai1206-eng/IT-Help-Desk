<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

/* Floating Button */
#chatBtn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #0078D4;
  color: white;
  border: none;
  border-radius: 50%;
  width: 55px;
  height: 55px;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* Chat Container */
#chatBox {
  display: none;
  position: fixed;
  bottom: 80px;
  right: 15px;
  width: 320px;
  height: 420px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Header */
#chatHeader {
  background: #0078D4;
  color: white;
  padding: 10px;
  font-weight: bold;
  text-align: center;
}

/* Messages Area */
#messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  background: #f5f5f5;
}

/* Bot Bubble */
.bot {
  background: #e1f0ff;
  padding: 8px;
  border-radius: 10px;
  margin: 5px 0;
  max-width: 80%;
}

/* User Bubble */
.user {
  background: #d1ffd6;
  padding: 8px;
  border-radius: 10px;
  margin: 5px 0;
  max-width: 80%;
  margin-left: auto;
}

/* Buttons */
.option {
  display: block;
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  border: none;
  background: #0078D4;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.option:hover {
  background: #005ea6;
}

/* Input Box */
.inputBox {
  width: 100%;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 6px;
  margin-top: 5px;
}

</style>
</head>

<body>

<button id="chatBtn" onclick="toggleChat()">💬</button>

<div id="chatBox">
  <div id="chatHeader">IT Help Desk</div>
  <div id="messages"></div>
</div>

<script>

// Toggle Chat
function toggleChat() {
  let box = document.getElementById("chatBox");
  box.style.display = box.style.display === "none" ? "flex" : "none";
  startBot();
}

// Add Bot Message
function addBot(msg, clear=false) {
  if(clear) document.getElementById("messages").innerHTML="";
  document.getElementById("messages").innerHTML += `<div class="bot">${msg}</div>`;
  scrollDown();
}

// Add User Message
function addUser(msg){
  document.getElementById("messages").innerHTML += `<div class="user">${msg}</div>`;
  scrollDown();
}

// Auto Scroll
function scrollDown(){
  let box = document.getElementById("messages");
  box.scrollTop = box.scrollHeight;
}

// Start Bot
function startBot(){
  addBot("Hello! Welcome to IT Help Desk", true);
  addBot("How can I help you?");
  mainMenu();
}

// Main Menu
function mainMenu(){
  document.getElementById("messages").innerHTML += `
    <button class="option" onclick="raiseTicket()">Raise Ticket</button>
    <button class="option" onclick="trackTicket()">Track Ticket</button>
    <button class="option" onclick="contactIT()">Talk to IT</button>
  `;
}

// Raise Ticket
function raiseTicket(){
  addBot("Select request type:", true);

  document.getElementById("messages").innerHTML += `
<button class="option" onclick="openForm('IT Service Request')">IT Service Request</button>
<button class="option" onclick="openForm('New Hardware Request')">New Hardware Request</button>
<button class="option" onclick="openForm('Remote Work Access Request')">Remote Work Access Request</button>
<button class="option" onclick="openForm('Mobile Access Request')">Mobile Access Request</button>
<button class="option" onclick="openForm('Zoho-One CRM Support Request')">Zoho-One CRM Support Request</button>
<button class="option" onclick="openForm('New User Request')">New User Request</button>
<button class="option" onclick="openForm('Training Request')">Training Request</button>
<button class="option" onclick="openForm('Asset Declaration')">Asset Declaration</button>
<button class="option" onclick="openForm('Data Request')">Data Request</button>
<button class="option" onclick="openForm('IT Satisfaction Survey')">IT Satisfaction Survey</button>
<button class="option" onclick="startBot()">⬅ Back</button>
  `;
}

// Open Forms
function openForm(type){
  addUser(type);
  
let links = {
  "IT Service Request": "https://forms.office.com/Pages/ResponsePage.aspx?id=paqN7sJIgUahza9uyO1zwtC1tAPUwFBDghay99JW111UOTZUQTEzVzlFU1ZKS0daRUpNOTYwQUxQVy4u",
  
  "New Hardware Request": "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=paqN7sJIgUahza9uyO1zwtC1tAPUwFBDghay99JW111UNzI0MUZGVEs1TkhMVUs1NUhBSkUxT0ZTSC4u",
  
  "Remote Work Access Request": "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=paqN7sJIgUahza9uyO1zwtC1tAPUwFBDghay99JW111UQkxLQU0zS0s4STBOTEUxSkZKWDQzR0I1RC4u",
  
  "Mobile Access Request": "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=paqN7sJIgUahza9uyO1zwtC1tAPUwFBDghay99JW111UQ0tTUkJTMVo1V1ZZRjlQU1VMUEpXUkM4SC4u",
  
  "Zoho-One CRM Support Request": "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=paqN7sJIgUahza9uyO1zwtC1tAPUwFBDghay99JW111UQkxEUjJLWUVKRjc4UEEyMEFHWkZLUDExSC4u",
  
  "New User Request": "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=paqN7sJIgUahza9uyO1zwtC1tAPUwFBDghay99JW111UNE1FQVU3OFZaVUxOSU4xQTZWWEVBMFBPWS4u",
  
  "Training Request": "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=paqN7sJIgUahza9uyO1zwtC1tAPUwFBDghay99JW111UNDlST1AyWVVLOFEwODhERUtUR1pWODdPOC4u",
  
  "Asset Declaration": "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=paqN7sJIgUahza9uyO1zwtC1tAPUwFBDghay99JW111UQ1YyUU05UThaSTBSOEFORzMySlczVDBUNy4u",
  
  "Data Request": "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=paqN7sJIgUahza9uyO1zwtC1tAPUwFBDghay99JW111URTc1NTBNMzNDOUlaUENHQk9UN1dKR0MwVS4u",
  
  "IT Satisfaction Survey": "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=paqN7sJIgUahza9uyO1zwtC1tAPUwFBDghay99JW111UQUoxQjRCVVFLSU1JN1NaRk5FUFZGWFU3TC4u",
  
};

  window.open(links[type]);
}

// Track Ticket (Input UI)
function trackTicket(){
  addBot("Enter your Ticket ID:", true);

  document.getElementById("messages").innerHTML += `
    <input id="ticket" class="inputBox" placeholder="eg: SR-2026-001">
    <button class="option" onclick="checkTicket()">Check Status</button>
    <button class="option" onclick="startBot()">⬅ Back</button>
  `;
}

function checkTicket(){
  let id = document.getElementById("ticket").value;
  addUser(id);
  addBot("Status: In Progress");
}

// Contact IT
function contactIT(){
  addBot("Contact IT:", true);

  document.getElementById("messages").innerHTML += `
<button class="option" onclick="openTeams()">Teams Chat</button>
<button class="option" onclick="openOutlook()">Outlook</button>
<button class="option" onclick="startBot()">⬅ Back</button>
  `;
}
function openTeams(){
  window.open("https://teams.microsoft.com/l/chat/0/0?users=it.support@millnest.com");
}
function openOutlook(){
  window.open("https://outlook.office.com/mail/deeplink/compose?to=it.support@millnest.com&subject=IT Support Request");
}
</script>

</body>
</html>
